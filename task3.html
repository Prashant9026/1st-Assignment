<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glenary's Restaurant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* NAV */
    nav {
      background-color: #2c2c2c;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
    }

    nav .brand {
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-size: 0.95rem;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    /* CONTENT */
    .container {
      padding: 30px 40px;
    }

    h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 6px;
    }

    /* MENU GRID */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .menu-card {
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 4px;
    }

    .menu-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      margin-bottom: 10px;
    }

    .menu-card h3 {
      font-size: 1rem;
      margin: 0 0 6px 0;
    }

    .menu-card p {
      font-size: 0.85rem;
      color: #555;
      margin: 0 0 8px 0;
      line-height: 1.4;
    }

    .menu-card .price {
      font-size: 0.9rem;
      color: #333;
    }

    /* POPULAR DISHES */
    #popular h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 6px;
    }

    #popular video {
      width: 100%;
      max-width: 560px;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="brand">Glenary's Restaurant</div>
    <ul>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#popular">Popular Dishes</a></li>
    </ul>
  </nav>

  <div class="container">

    <!-- MENU SECTION -->
    <section id="menu">
      <h2>Menu</h2>
      <div class="menu-grid">

        <div class="menu-card">
          <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&q=80" alt="Pizza Supreme" />
          <h3>Pizza Supreme</h3>
          <p>Pizza sauce, mozzarella, bacon, onion, beef mince, capsicum, pepperoni, mushroom, olives</p>
          <p class="price">Price: ₹250</p>
        </div>

        <div class="menu-card">
          <img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=600&q=80" alt="Paneer Tikka" />
          <h3>Paneer Tikka</h3>
          <p>Paneer, Yogurt, Ground Spices, Bell Peppers, Onions, Baby Corn, Mushrooms</p>
          <p class="price">Price: ₹200</p>
        </div>

      </div>
    </section>

    <!-- POPULAR DISHES SECTION -->
    <section id="popular">
      <h2>Popular Dishes</h2>
      <video controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </section>

  </div>

</body>
</html>
